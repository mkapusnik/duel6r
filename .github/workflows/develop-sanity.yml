name: Develop - Sanity check
on:
  push:
    branches: [ develop ]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull build image
        run: docker pull ghcr.io/${{ github.repository_owner }}/duel6r-build:develop

      - name: Build runtime bundle inside container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            ghcr.io/${{ github.repository_owner }}/duel6r-build:develop

      - name: Verify build output
        run: test -x build/duel6r

  tag:
    name: Tag - sanity
    permissions:
      contents: 'write'
    runs-on: ubuntu-latest
    needs: [sanity]
    steps:
      - uses: actions/checkout@v6

      - uses: mkapusnik/commons/.github/actions/tag@master
        with:
          tag: sanity
          token: ${{ secrets.PAT }}

      - run: gh workflow enable develop-nightly-scheduler.yml
        env:
          GH_TOKEN: ${{ secrets.PAT }}
