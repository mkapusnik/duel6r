name: Develop - Build Container Image

on:
  push:
    branches: [ develop ]
    paths:
      - Dockerfile
      - Dockerfile.windows-cross
      - docker/build.sh
      - docker/build-windows.sh
      - docker/toolchains/mingw-w64-x86_64.cmake
      - .github/workflows/develop-build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-build-image:
    name: Publish Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta-linux
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/duel6r-build
          tags: |
            type=raw,value=develop
            type=sha,prefix=sha-

      - name: Build and push Linux build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-linux.outputs.tags }}
          labels: ${{ steps.meta-linux.outputs.labels }}

      - name: Extract Docker metadata (Windows cross)
        id: meta-win
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/duel6r-build-w64
          tags: |
            type=raw,value=develop
            type=sha,prefix=sha-

      - name: Build and push Windows cross image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.windows-cross
          push: true
          tags: ${{ steps.meta-win.outputs.tags }}
          labels: ${{ steps.meta-win.outputs.labels }}
