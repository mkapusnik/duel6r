name: Nightly - Builds
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Nightly Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull Linux build image
        run: docker pull ghcr.io/${{ github.repository }}/build:develop

      - name: Pull Windows cross build image
        run: docker pull ghcr.io/${{ github.repository }}/build-w64:develop

      - name: Build Linux nightly files inside shared bundle
        run: |
          docker run --rm \
            -e BUILD_TESTING=ON \
            -e OUTPUT_DIR=build \
            -e RUN_TESTS=ON \
            -e CLEAN_OUTPUT_DIR=ON \
            -v "$PWD:/workspace" \
            ghcr.io/${{ github.repository }}/build:develop

      - name: Build Windows nightly files inside shared bundle
        run: |
          docker run --rm \
            -e BUILD_TESTING=ON \
            -e OUTPUT_DIR=build \
            -e RUN_TESTS=OFF \
            -e CLEAN_OUTPUT_DIR=OFF \
            -v "$PWD:/workspace" \
            ghcr.io/${{ github.repository }}/build-w64:develop

      - name: Verify shared nightly bundle
        run: |
          test -x build/duel6r
          test -f build/duel6r.exe
          test -d build/data
          test -d build/levels
          test -d build/profiles
          test -d build/shaders
          test -d build/sound
          test -d build/textures

      - name: Package nightly bundle
        id: package
        shell: bash
        run: |
          archive_name="duel6r-nightly.zip"

          ARCHIVE_NAME="$archive_name" python - <<'PY'
          import os
          import zipfile

          archive_name = os.environ["ARCHIVE_NAME"]
          root = "build"

          with zipfile.ZipFile(archive_name, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for current_root, _, files in os.walk(root):
                  for file_name in files:
                      path = os.path.join(current_root, file_name)
                      archive.write(path, path)
          PY

          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  release:
    name: Publish nightly pre-release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download nightly artifact
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          files: |
            release-assets/**/*.zip

  tag:
    name: Tag - nightly
    permissions:
      contents: 'write'
    runs-on: ubuntu-latest
    needs: [build, release]
    steps:
      - uses: actions/checkout@v6
      - uses: mkapusnik/commons/.github/actions/tag@master
        with:
          tag: nightly
          token: ${{ secrets.PAT }}
