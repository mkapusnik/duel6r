name: Release Artifact

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-docker-release-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker release image
        id: docker-image
        run: |
          echo "image=$(docker build -q .)" >> "$GITHUB_OUTPUT"

      - name: Export release bundle
        run: |
          mkdir -p dist
          cid="$(docker create "${{ steps.docker-image.outputs.image }}")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$cid:/release/." dist
          docker rm "$cid" >/dev/null
          trap - EXIT

      - name: Package release artifact
        id: package
        run: |
          archive_name="duel6r-${GITHUB_REF_NAME}-linux.zip"
          mkdir -p artifact
          cp -a dist artifact/duel6r
          (
            cd artifact
            zip -r "../${archive_name}" duel6r
          )
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive_name }}
          generate_release_notes: true
