name: Release Artifact

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-release-artifact:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runs-on: ubuntu-latest
          - target: windows
            runs-on: ubuntu-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Linux build image
        if: matrix.target == 'linux'
        run: docker pull ghcr.io/${{ github.repository_owner }}/duel6r-build:develop

      - name: Pull Windows cross build image
        if: matrix.target == 'windows'
        run: docker pull ghcr.io/${{ github.repository_owner }}/duel6r-build-w64:develop

      - name: Build Linux release bundle
        if: matrix.target == 'linux'
        run: |
          docker run --rm \
            -e OUTPUT_DIR=dist \
            -v "$PWD:/workspace" \
            ghcr.io/${{ github.repository_owner }}/duel6r-build:develop

      - name: Build Windows release bundle inside container
        if: matrix.target == 'windows'
        run: |
          docker run --rm \
            -e OUTPUT_DIR=dist \
            -e BUILD_TESTING=OFF \
            -e RUN_TESTS=OFF \
            -v "$PWD:/workspace" \
            ghcr.io/${{ github.repository_owner }}/duel6r-build-w64:develop

      - name: Package release artifact
        id: package
        shell: bash
        env:
          ARCHIVE_SUFFIX: ${{ matrix.target }}
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          archive_name="duel6r-${safe_ref}-${ARCHIVE_SUFFIX}.zip"
          mkdir -p artifact
          cp -a dist artifact/duel6r

          ARCHIVE_NAME="$archive_name" python - <<'PY'
          import os
          import zipfile

          archive_name = os.environ["ARCHIVE_NAME"]
          root = os.path.join("artifact", "duel6r")

          with zipfile.ZipFile(archive_name, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for current_root, _, files in os.walk(root):
                  for file_name in files:
                      path = os.path.join(current_root, file_name)
                      archive.write(path, os.path.relpath(path, "artifact"))
          PY

          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  publish-github-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release-artifact
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
          generate_release_notes: true
